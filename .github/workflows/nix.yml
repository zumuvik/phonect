name: CI — Nix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/nix.yml"
      - "phonect-service.nix"
      - "package.nix"
      - "flake.nix"
      - "flake.lock"
      - "pyproject.toml"
      - "LICENSE"
      - "src/**"
      - "tests/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/nix.yml"
      - "phonect-service.nix"
      - "package.nix"
      - "flake.nix"
      - "flake.lock"
      - "pyproject.toml"
      - "LICENSE"
      - "src/**"
      - "tests/**"
      - "scripts/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Check flake
        run: nix flake check --no-write-lock-file --print-build-logs

      - name: Build package
        run: nix build .#packages.x86_64-linux.default --no-write-lock-file --print-build-logs

      - name: Verify packaged CLI
        run: |
          ./result/bin/phonect --help > help.txt
          grep -Eq '^[[:space:]]+daemon[[:space:]]' help.txt
          grep -Eq '^[[:space:]]+pair[[:space:]]' help.txt
          ! grep -Eq '^[[:space:]]+tui[[:space:]]' help.txt
